services:
  gpt-load:
    image: ghcr.io/tbphp/gpt-load:latest
    container_name: gpt-load
    env_file:
      - .env
    networks:
      - overlays-custom-net
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=overlays-custom-net"
      # Router HTTPS
      - "traefik.http.routers.gpt-load.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.gpt-load.entrypoints=websecure"
      - "traefik.http.routers.gpt-load.tls.certresolver=letsencrypt"
      # OJO: Puerto interno donde la app escucha realmente
      - "traefik.http.services.gpt-load.loadbalancer.server.port=3001"

    volumes:
      - gpt-load-data:/app/data
    stop_grace_period: ${SERVER_GRACEFUL_SHUTDOWN_TIMEOUT:-10}s
    healthcheck:
      # Usamos CMD-SHELL para mayor compatibilidad con la imagen de GHCR
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # Aumentado a 60s para dar tiempo a la app de iniciar

volumes:
  gpt-load-data:

networks:
  overlays-custom-net:
    external: true
