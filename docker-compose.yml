services:
  gpt-load:
    image: ghcr.io/tbphp/gpt-load:latest
    container_name: gpt-load
    env_file:
      - .env
    networks:
      - overlays-custom-net
    restart: always
    labels:
      - "traefik.enable=true"
      # OBLIGATORIO: Usar la red que conectamos a Traefik
      - "traefik.docker.network=overlays-custom-net"

      # Router HTTPS
      - "traefik.http.routers.gpt-load-secure.rule=Host(`gemini.overlays.tv`)"
      - "traefik.http.routers.gpt-load-secure.entrypoints=websecure"
      - "traefik.http.routers.gpt-load-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.gpt-load-secure.loadbalancer.server.port=3001"

      # Router HTTP (Redirección)
      - "traefik.http.routers.gpt-load-http.rule=Host(`gemini.overlays.tv`)"
      - "traefik.http.routers.gpt-load-http.entrypoints=web"
      - "traefik.http.routers.gpt-load-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

    volumes:
      - gpt-load-data:/app/data
    healthcheck:
      # Asegúrate de que el puerto aquí coincida con el interno de la app
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # depends_on:
    #   mysql:
    #     condition: service_healthy
    #     restart: true
    #   postgres:
    #     condition: service_healthy
    #     restart: true
    #   redis:
    #     condition: service_healthy
    #     restart: true

