services:
  gpt-load:
    image: ghcr.io/tbphp/gpt-load:latest
    container_name: gpt-load
    env_file:
      - .env
    # Mantenemos el mapeo de puertos por si necesitas acceso directo vía IP:PORT
    ports:
      - "${PORT:-3001}:3001"
    networks:
      - overlays-custom-net
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=overlays-custom-net"

      # Router HTTPS (Secure)
      - "traefik.http.routers.gpt-load.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.gpt-load.entrypoints=websecure"
      # CORRECCIÓN: Cambiado de 'le' a 'letsencrypt' para coincidir con tu config de Dokploy
      - "traefik.http.routers.gpt-load.tls.certresolver=letsencrypt"
      - "traefik.http.services.gpt-load.loadbalancer.server.port=3001"

      # Router HTTP (Redirección automática)
      - "traefik.http.routers.gpt-load-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.gpt-load-http.entrypoints=web"
      - "traefik.http.routers.gpt-load-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

    volumes:
      - gpt-load-data:/app/data
    stop_grace_period: ${SERVER_GRACEFUL_SHUTDOWN_TIMEOUT:-10}s
    healthcheck:
      # Usamos CMD-SHELL para mayor compatibilidad con la imagen de GHCR
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # Aumentado a 60s para dar tiempo a la app de iniciar

volumes:
  gpt-load-data:

networks:
  overlays-custom-net:
    external: true
